# Nightly Benchmarks — criterion performance tracking
name: Nightly Bench
on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:
concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true
jobs:
  bench:
    uses: paiml/.github/.github/workflows/sovereign-ci.yml@main
    with:
      repo: ${{ github.event.repository.name }}
      run_benchmarks: true
    secrets: inherit

