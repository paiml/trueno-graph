# PMAT Quality Gate Configuration for trueno-graph
# Sovereign AI Stack - GPU-first graph analytics

[gates]
# Run clippy linter
run_clippy = true

# Enforce strict clippy (-D warnings)
clippy_strict = true

# Run test suite
run_tests = true

# Test timeout in seconds
test_timeout = 300

# Check code coverage
check_coverage = true

# Minimum coverage percentage
min_coverage = 85.0

# Check cyclomatic complexity
check_complexity = true

# Maximum cyclomatic complexity per function
max_complexity = 25

[exclude]
# Exclude generated code and test utilities
paths = ["target/", "benches/"]
